<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인카드 사용내역 작성 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{ --ink:#17253a; --muted:#65758d; --line:#dbe5f2; --blue:#417cc1; --blue-weak:#eef4fb; --bg:#f4f7fb; --surface:#fff; }
  *{box-sizing:border-box;}
  body{ margin:0; color:var(--ink); background:var(--bg); line-height:1.6;
    font-family:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:920px; margin:0 auto; padding:40px 22px 80px; }

  .doc-head{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:32px 32px 28px; box-shadow:0 16px 34px rgba(36,56,84,.06); margin-bottom:24px; }
  .doc-badge{ display:inline-block; font-size:12px; font-weight:800; color:var(--blue); background:var(--blue-weak); border-radius:999px; padding:5px 13px; margin-bottom:13px; }
  .doc-head h1{ margin:0 0 9px; font-size:27px; font-weight:900; letter-spacing:-.01em; }
  .doc-head p{ margin:0; color:var(--muted); font-size:14.5px; }

  .doc-card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px 22px 24px; margin-bottom:18px; box-shadow:0 4px 12px rgba(15,23,42,.04); }
  .doc-cap{ display:flex; align-items:center; gap:9px; margin-bottom:14px; }
  .doc-cap .no{ display:grid; place-items:center; width:26px; height:26px; border-radius:8px; background:var(--blue); color:#fff; font-size:13px; font-weight:900; flex:0 0 auto; }
  .doc-cap b{ font-size:16px; font-weight:900; }
  .doc-cap small{ color:var(--muted); font-size:12.5px; font-weight:700; margin-left:auto; }
  .doc-img{ width:100%; height:auto; display:block; border:1px solid #e7eef7; border-radius:10px; }
  .doc-card .scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:10px; }
  a.doc-link{ display:block; text-decoration:none; }
  .zoom-hint{ margin:9px 2px 0; font-size:12px; color:#9aa8bd; }

  @media (max-width:600px){
    .wrap{ padding:24px 14px 60px; }
    .doc-head{ padding:24px 18px; } .doc-head h1{ font-size:22px; }
    .doc-card{ padding:16px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="doc-head">
    <span class="doc-badge">경영관리팀 · 가이드</span>
    <h1>법인카드 사용내역 작성 가이드</h1>
    <p>법인카드 사용내역 작성 및 결재 절차 안내 — 가이드 문서와 품의서·사용내역 리스트 양식입니다. (이미지를 클릭하면 원본 크기로 볼 수 있습니다)</p>
  </div>

  <div class="doc-card">
    <div class="doc-cap"><span class="no">1</span><b>작성 가이드</b><small>원문 PDF</small></div>
    <a class="doc-link" href="corp-card-guide_files/guide-1.png" target="_blank" rel="noopener">
      <img class="doc-img" src="corp-card-guide_files/guide-1.png" alt="법인카드 사용내역 작성 가이드 (PDF 원문)" loading="lazy">
    </a>
  </div>

  <div class="doc-card">
    <div class="doc-cap"><span class="no">2</span><b>법인카드 사용 품의서 (양식)</b><small>원문 Excel</small></div>
    <a class="doc-link" href="corp-card-guide_files/form-1.png" target="_blank" rel="noopener">
      <img class="doc-img" src="corp-card-guide_files/form-1.png" alt="법인카드 사용 품의서 양식 (Excel 원문)" loading="lazy">
    </a>
  </div>

  <div class="doc-card">
    <div class="doc-cap"><span class="no">3</span><b>법인카드 사용내역 리스트 (양식·예시)</b><small>원문 Excel</small></div>
    <div class="scroll">
      <a class="doc-link" href="corp-card-guide_files/form-2.png" target="_blank" rel="noopener">
        <img class="doc-img" src="corp-card-guide_files/form-2.png" alt="법인카드 사용내역 리스트 양식 및 작성예시 (Excel 원문)" style="min-width:760px;" loading="lazy">
      </a>
    </div>
    <p class="zoom-hint">※ 가로로 넓은 표입니다. 이미지를 클릭하면 원본 크기로 또렷하게 볼 수 있어요.</p>
  </div>

</div>
</body>
</html>
